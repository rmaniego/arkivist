name: Publish to PyPI

# Publishes the package to PyPI using Trusted Publishing (OIDC) — no API
# tokens are stored in the repository. A publish is triggered when a GitHub
# Release is published (the explicit "this build goes public" gate), or
# manually via the Actions tab. Weekly internal AK.* tags do NOT publish on
# their own; create a Release from the tag you want to ship publicly.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test and build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine
          python -m pip install -e .

      - name: Run test suite
        run: python -m unittest discover -s tests -v

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distributions
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment name here must match the Trusted Publisher config on
    # PyPI and the environment configured under the repository settings.
    environment:
      name: pypi
      url: https://pypi.org/p/arkivist
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
